<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP32 Mesh Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <header class="top-bar">
    <div class="brand">ESP32 Mesh Dashboard</div>
    <div class="status">
      <span class="badge badge-disconnected" id="conn-status">Disconnected</span>
      <span id="last-update" class="last-update">Last update: -</span>
    </div>
  </header>

  <main class="layout">
    <section class="panel">
      <h2>Mesh Overview</h2>
      <div class="mesh-summary">
        <span>Total Nodes (incl. root): <strong id="mesh-node-count">0</strong></span>
      </div>
    </section>

    <section class="panel">
      <h2>Nodes Table</h2>
      <div class="table-wrapper">
        <table class="nodes-table">
          <thead>
            <tr>
              <th>Node ID</th>
              <th>Role</th>
              <th>Temp (°C)</th>
              <th>Humidity (%)</th>
              <th>Distance (cm)</th>
              <th>Last Update</th>
            </tr>
          </thead>
          <tbody id="nodes-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>Event Log</h2>
      <ul class="event-log" id="event-log"></ul>
    </section>
  </main>
</body>
</html>
